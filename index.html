<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOF - TACTICAL COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260309">
</head>

<body class="bg-black text-cyan-500 overflow-hidden font-inter h-screen flex flex-col items-center justify-center p-4">

    <!-- SCANLINE EFFECT -->
    <div class="scanlines"></div>

    <div
        class="hud-container w-full max-w-6xl h-full flex flex-col border border-cyan-500/20 rounded-lg p-2 lg:p-4 relative overflow-hidden bg-slate-900/40 backdrop-blur-xl shadow-[0_0_50px_rgba(0,163,255,0.1)]">

        <!-- CORNER ACCENTS -->
        <div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-cyan-400"></div>
        <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-cyan-400"></div>
        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-cyan-400"></div>
        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-cyan-400"></div>

        <!-- HEADER -->
        <header
            class="flex flex-col items-center mb-2 lg:mb-6 border-b border-cyan-500/30 pb-2 lg:pb-4 relative w-full">
            <!-- MOBILE MENU BUTTON (Visible ONLY ON PHONE < 769px) -->
            <div class="absolute top-2 left-2 menu-toggle-btn">
                <button onclick="toggleMobileMenu()" title="Ouvrir le menu"
                    class="p-2 text-cyan-400 hover:text-white transition-all">
                    <i data-lucide="menu"></i>
                </button>
            </div>

            <!-- CENTERED LOGO -->
            <div class="header-logo mb-1 lg:mb-4">
                <img src="logo.png" alt="FOF Logo"
                    class="w-12 h-12 lg:w-28 lg:h-28 object-contain drop-shadow-[0_0_20px_rgba(0,242,255,0.8)]">
            </div>

            <!-- TIME & DURATION (BELOW LOGO) -->
            <div class="header-time flex flex-col items-center gap-0 lg:gap-1 mb-2 lg:mb-3">
                <div id="real-time-clock"
                    class="font-orbitron font-black text-white text-lg lg:text-3xl tracking-widest drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">
                    --:--:--
                </div>
                <!-- SHIFT DURATION -->
                <div id="shift-duration-container"
                    class="hidden flex items-center gap-2 px-2 py-0.5 rounded-full bg-cyan-500/10 border border-cyan-500/30">
                    <span class="text-[7px] lg:text-[10px] uppercase font-black tracking-widest text-cyan-500/70">Temps
                        en service</span>
                    <span id="shift-duration-timer"
                        class="font-orbitron text-[10px] lg:text-sm font-black text-cyan-400">00:00:00</span>
                </div>
            </div>

            <!-- CENTERED TITLE -->
            <div class="header-title text-center px-8">
                <h1
                    class="text-[10px] lg:text-2xl xl:text-3xl font-black uppercase tracking-[0.1em] text-white font-orbitron leading-none">
                    Tableau de Bord - Logistique FOF
                </h1>
            </div>

            <!-- STATUS BADGE (CORNER POSITIONING) -->
            <div class="header-badge absolute top-2 right-2 lg:top-4 lg:right-4">
                <div id="sl-status-badge"
                    class="px-1.5 py-0.5 lg:px-2 lg:py-1 rounded border border-cyan-500/20 bg-cyan-500/5 text-[7px] lg:text-[10px] font-black uppercase tracking-widest flex items-center gap-1 opacity-70">
                    <span id="sl-status-text">OFFLINE</span>
                </div>
            </div>
        </header>

        <!-- MOBILE MENU OVERLAY -->
        <div id="mobile-menu-overlay"
            class="fixed inset-0 z-[150] bg-black/95 backdrop-blur-xl menu-closed flex flex-col p-8 lg:hidden">
            <div class="flex justify-between items-center mb-12">
                <img src="logo.png" class="w-12 h-12 object-contain" alt="FOF Menu Logo">
                <button onclick="toggleMobileMenu()" title="Fermer le menu" class="p-2 text-cyan-400">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            <nav class="flex flex-col gap-8 text-center">
                <button onclick="changeView('dashboard'); toggleMobileMenu()"
                    class="text-2xl font-black font-orbitron text-white uppercase tracking-widest">Tableau</button>
                <button onclick="changeView('operations'); toggleMobileMenu()"
                    class="text-2xl font-black font-orbitron text-white uppercase tracking-widest">Opérations</button>
                <button onclick="changeView('fleet'); toggleMobileMenu()"
                    class="text-2xl font-black font-orbitron text-white uppercase tracking-widest">Catalogue
                    Flotte</button>
                <button onclick="changeView('service'); toggleMobileMenu()"
                    class="text-2xl font-black font-orbitron text-white uppercase tracking-widest">Gestion
                    Service</button>
            </nav>
            <div class="mt-auto text-center py-8">
                <div class="text-[10px] font-black text-cyan-500/40 uppercase tracking-[0.5em]">Tactical HUB v2.5</div>
                <div class="text-[8px] text-slate-500 mt-2 uppercase">Mobile command interface for FOF Logistics</div>
            </div>
        </div>

        <!-- MAIN DASHBOARD VIEW -->
        <main id="main-content" class="flex-1 overflow-hidden">
            <!-- Initial content will be injected by app.js:init() -> render() -->
            <div class="flex items-center justify-center h-full flex-col gap-4 opacity-40">
                <i data-lucide="loader-2" class="w-10 h-10 animate-spin"></i>
                <span class="text-xs font-black uppercase tracking-[0.3em]">Initialisation du Hub Tactique...</span>
            </div>
        </main>

        <!-- BOTTOM NAV BAR / STATUS BAR -->
        <footer class="mt-auto border-t border-cyan-500/30 pt-3 flex items-center justify-center pb-2">
            <nav class="flex justify-around w-full max-w-md py-1">
                <button onclick="changeView('dashboard')" title="Tableau de bord"
                    class="nav-btn flex flex-col items-center gap-1 text-cyan-400">
                    <i data-lucide="layout-grid"></i>
                    <span class="uppercase font-black tracking-widest text-[8px]">Tableau</span>
                </button>
                <button onclick="changeView('operations')" title="Suivi des opérations"
                    class="nav-btn flex flex-col items-center gap-1 text-slate-500">
                    <i data-lucide="crosshair"></i>
                    <span class="uppercase font-black tracking-widest text-[8px]">Opér.</span>
                </button>
                <button onclick="changeView('fleet')" title="Catalogue de la flotte"
                    class="nav-btn flex flex-col items-center gap-1 text-slate-500">
                    <i data-lucide="database"></i>
                    <span class="uppercase font-black tracking-widest text-[8px]">Flotte</span>
                </button>
                <button onclick="changeView('service')" title="Gestion du service"
                    class="nav-btn flex flex-col items-center gap-1 text-slate-500">
                    <i data-lucide="user-cog"></i>
                    <span class="uppercase font-black tracking-widest text-[8px]">Service</span>
                </button>
            </nav>
        </footer>

    </div>

    <!-- TACTICAL MODAL OVERLAY -->
    <div id="modal-overlay"
        class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div id="modal-content"
            class="hud-panel bg-slate-950 border-2 border-cyan-500/40 rounded-lg w-full max-w-lg overflow-hidden relative shadow-[0_0_100px_rgba(0,163,255,0.2)]">
            <!-- Content injected via JS -->
        </div>
    </div>

    <script src="app.js?v=20260309"></script>
</body>

</html>
