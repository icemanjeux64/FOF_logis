<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOF - Mobile Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="pb-24 overflow-x-hidden">

    <!-- FIXED TOP BAR -->
    <header class="sticky top-0 z-50 bg-[#0f1115]/95 backdrop-blur-md border-b border-white/10 p-4 mili-shadow">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded flex items-center justify-center overflow-hidden">
                    <img src="logo.png" alt="FOF Logo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="font-black text-sm uppercase tracking-tighter text-white leading-none">Logistique FOF
                    </h1>
                </div>
            </div>
            <div class="text-right">
                <div id="shift-timer" class="mono text-green-500 font-bold text-sm">00:00:00</div>
                <div id="sl-status" class="text-[9px] font-bold text-slate-500 uppercase">En attente</div>
            </div>
        </div>

        <!-- QUICK STATS -->
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-900/80 border border-white/5 p-2 rounded flex flex-col items-center">
                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1">Supply</span>
                <span id="stat-supply" class="mono text-sm font-bold text-blue-400">12000</span>
            </div>
            <div class="bg-slate-900/80 border border-white/5 p-2 rounded flex flex-col items-center">
                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1">Actifs</span>
                <span id="stat-active" class="mono text-sm font-bold text-green-400">0</span>
            </div>
            <div class="bg-slate-900/80 border border-white/5 p-2 rounded flex flex-col items-center">
                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1">Effectifs</span>
                <span id="stat-personnel" class="mono text-sm font-bold text-orange-400">0</span>
            </div>
            <div class="bg-slate-900/80 border border-white/5 p-2 rounded flex flex-col items-center">
                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1">Pertes</span>
                <span id="stat-lost" class="mono text-sm font-bold text-red-500">0</span>
            </div>
            <div class="bg-slate-900/80 border border-white/5 p-2 rounded flex flex-col items-center">
                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1">V2/EVS</span>
                <span id="stat-medics" class="mono text-sm font-bold text-pink-400">0</span>
            </div>
            <div class="bg-slate-900/80 border border-white/5 p-2 rounded flex flex-col items-center opacity-40">
                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1">EVASAN</span>
                <i data-lucide="ambulance" class="w-3 h-3 text-pink-500/50"></i>
            </div>
        </div>
    </header>

    <!-- CONTENT AREA -->
    <main id="main-content" class="p-4 transition-all duration-300">
        <!-- Loader during init -->
        <div class="flex flex-col items-center justify-center py-20 text-slate-600">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-[10px] font-bold uppercase tracking-widest">Connexion au QG...</p>
        </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-[#0f1115] border-t border-white/10 flex justify-around items-center p-3 pb-6 z-50 mili-shadow">
        <button onclick="switchTab('dashboard')" id="nav-dashboard"
            class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="text-[8px] uppercase font-black tracking-widest">Dashboard</span>
        </button>
        <button onclick="switchTab('fleet')" id="nav-fleet"
            class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
            <i data-lucide="truck" class="w-5 h-5"></i>
            <span class="text-[8px] uppercase font-black tracking-widest">Flotte</span>
        </button>
        <button onclick="switchTab('ops')" id="nav-ops"
            class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
            <i data-lucide="crosshair" class="w-5 h-5"></i>
            <span class="text-[8px] uppercase font-black tracking-widest">Opérations</span>
        </button>
        <button onclick="switchTab('admin')" id="nav-admin"
            class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span class="text-[8px] uppercase font-black tracking-widest">Admin</span>
        </button>
    </nav>

    <!-- MODAL OVERLAY -->
    <div id="modal-overlay"
        class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-6">
        <div id="modal-content"
            class="bg-[#1a202c] border border-white/10 rounded-2xl w-full max-w-sm overflow-hidden mili-shadow animate-in fade-in zoom-in duration-200">
            <!-- Content injected via JS -->
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
